# The single definition of "relevant to me" (DESIGN §11).
#
# This file is injected (prompt-cached) into every scoring and synthesis prompt.
# Tuning the system means editing THIS file plus `signalforge mark useful|noise`
# feedback — never editing prompts (CLAUDE.md §4).
#
# Validated by `InterestsConfig` in src/signalforge/config.py.
#
# Profile: an executive-quality briefing on where AI is heading — industry
# direction & thought leadership, frontier-lab breakthroughs, enterprise AI
# adoption, and AI policy. Engineering/tooling is now a minor lane (the
# operator still builds SignalForge day to day), not the main lens.

# Free `group.leaf` labels. taxonomy.yaml doesn't exist yet and isn't
# validated against this list — these are readable labels, not keys looked
# up elsewhere.
priority_topics:
  - industry.strategy
  - frontier.capabilities
  - enterprise.adoption
  - agents.autonomy
  - policy.regulation
  - ai.research-direction

interests:
  - ai-strategy
  - frontier-models
  - enterprise-ai
  - ai-policy
  - agents
  - thought-leadership
  - claude-code
  - local-first
  - trading-systems

# The minor engineering lane: the operator still builds SignalForge itself.
stack:
  - python
  - typescript
  - sqlite
  - docker
  - wsl

learning_goals:
  - where AI capabilities are heading over the next 6-24 months
  - enterprise AI adoption and business impact
  - AI policy and governance
  - agent memory architectures
  - production llm evaluation

architecture_philosophy: >
  Local-first, deterministic pipelines, low operational cost, monolith-by-default,
  boring technology, human-in-the-loop.

ignore:
  topics:
    - crypto
    - web3
    # `model-release-hype` was intentionally REMOVED from this list — frontier-lab
    # announcements now matter to the profile, and the rewritten `signal` rubric
    # dimension is what penalizes contentless hype, instead of a blanket topic
    # ignore that would have thrown out real breakthroughs with the noise.
  people: []
  repos: []

# Weekly-brief inclusion gates (DESIGN §9):
#   signal >= weekly_min_signal AND relevance >= weekly_min_relevance
#   AND (signal + relevance + novelty) >= weekly_min_total
#
# daily_max_items caps the Daily Digest at the top-N ranked kept items
# (DESIGN §13's 60-second read); the rest are counted in the footer.
#
# The two daily_* crowding knobs below exist because rank alone lets volume
# beat merit: a release watch that ships four versions in one window, or a
# link blog that posts ten times, sweeps the top of the ranking and pushes
# genuinely different items under the cap.
thresholds:
  weekly_min_signal: 3
  weekly_min_relevance: 3
  weekly_min_total: 10
  daily_max_items: 15

  # At most N items from any one source may take digest slots.
  daily_max_per_source: 2

  # One release per repo — the highest-ranked, not the newest (a prerelease
  # publishes after the stable release it follows).
  daily_max_per_github_repo: 1
